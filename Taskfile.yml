version: '3'

tasks:
  deps:
    desc: "Update Go dependencies"
    cmds:
      - go get -u ./...
      - go mod tidy

  db:up:
    desc: "Start PostgreSQL database"
    cmds:
      - docker-compose up -d postgres
      - echo "✓ Database started on localhost:5432"


  db:down:
    desc: "Stop PostgreSQL database"
    cmds:
      - docker-compose down
      - echo "✓ Database stopped"

  db:clear:
    desc: "Clear database (drop and recreate)"
    cmds:
      - docker-compose exec -T postgres psql -U user -d postgres -c "DROP DATABASE IF EXISTS peeingdog;"
      - docker-compose exec -T postgres psql -U user -d postgres -c "CREATE DATABASE peeingdog;"
      - cat sql/schema/schema.sql | docker-compose exec -T postgres psql -U user -d peeingdog
      - echo "✓ Database cleared and schema reinitialized"

  db:reset:
    desc: "Reset database (stop, clear, start)"
    cmds:
      - task: db:down
      - task: db:up
      - task: db:clear

  run:
    desc: "Start database and run server"
    cmds:
      - go run main.go

  dev:fresh:
    desc: "Fresh start: reset DB and run server"
    cmds:
      - task: db:reset
      - sleep 2
      - go run main.go

  sqlc:generate:
    desc: "Generate sqlc code from SQL queries"
    cmds:
      - sqlc generate
      - echo "✓ sqlc code generated"

  swift:generate:
    desc: "Generate Swift client from OpenAPI spec"
    cmds:
      - mkdir -p clients/swift
      - openapi-generator generate -i openapi.yaml -g swift5 -o clients/swift --additional-properties=packageName=PeeingdogAPI
      - echo "✓ Swift client generated"

  python:generate:
    desc: "Generate Python client from OpenAPI spec"
    cmds:
      - mkdir -p clients/python
      - openapi-generator generate -i openapi.yaml -g python -o clients/python --additional-properties=packageName=peeingdog_api
      - echo "✓ Python client generated"

  typescript:generate:
    desc: "Generate TypeScript client from OpenAPI spec"
    cmds:
      - mkdir -p clients/typescript
      - openapi-generator generate -i openapi.yaml -g typescript-fetch -o clients/typescript --additional-properties=npmName=peeingdog-api
      - echo "✓ TypeScript client generated"

  clients:generate:
    desc: "Generate all client SDKs (Swift, Python, TypeScript)"
    cmds:
      - task: swift:generate
      - task: python:generate
      - task: typescript:generate
      - echo "✓ All clients generated"

  test:
    desc: "Run tests"
    cmds:
      - go test ./...

